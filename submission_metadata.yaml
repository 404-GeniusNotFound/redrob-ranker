# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Google Gemini (via Antigravity agent) for architecture discussion, 
  code scaffolding, and review. All core ranking logic, scoring weights, 
  and feature engineering decisions are my own design based on careful 
  analysis of the JD and dataset. No candidate data was sent to any LLM 
  during the ranking process — the system runs fully offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  5-stage pipeline: hard filters, multi-dimensional feature engineering,
  weighted score fusion, honeypot detection, and reasoning generation.
  Six scoring dimensions: career-narrative coherence (product vs services,
  tenure stability, role progression), skill-depth authenticity (must-have
  coverage weighted by duration and assessment scores), JD semantic alignment
  (TF-IDF with trigrams), behavioral availability (recency, response rate,
  notice period), location fit, and education credibility. Honeypot detection
  uses 6 anomaly checks (experience-date mismatch, skill inflation,
  title-description incoherence, impossible timelines, keyword stuffing
  patterns, abnormal signal combinations). Runtime ~90 seconds for 100K
  candidates on CPU.

